<!DOCTYPE html>
<html>
<head>
    <title>Report Missing Child</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Report Missing Child</h1>

<p>Please fill the form below to report a missing child.</p>

<form>

<label>Child Name:</label><br>
<input type="text" placeholder="Enter child name"><br><br>

<label>Age:</label><br>
<input type="number" placeholder="Enter age"><br><br>

<label>Gender:</label><br>
<select>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select><br><br>

<label>Last Seen Location:</label><br>
<input type="text" placeholder="Enter location"><br><br>

<label>Date Missing:</label><br>
<input type="date" ><br><br>

<label>Upload Child Photo:</label><br>
<input type="file"><br><br>

<label>Contact Number:</label><br>
<input type="tel" placeholder="Enter phone number"><br><br>

<button type="submit">Submit Report</button>

</form>

</body>

</html>
